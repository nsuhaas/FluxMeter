<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FluxMeter</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --green:  #00e676;
    --yellow: #ffeb3b;
    --orange: #ff9800;
    --red:    #f44336;
    --glass-bg: rgba(18, 18, 28, 0.82);
    --glass-border: rgba(255,255,255,0.10);
    --text: #e8e8f0;
    --muted: #7b7b9a;
  }

  html, body {
    width: 220px;
    height: 320px;
    background: transparent;
    overflow: hidden;
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    color: var(--text);
    user-select: none;
    -webkit-user-select: none;
  }

  /* ── Root widget ── */
  #widget {
    width: 220px;
    height: 320px;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: 18px;
    backdrop-filter: blur(24px) saturate(160%);
    -webkit-backdrop-filter: blur(24px) saturate(160%);
    display: flex;
    flex-direction: column;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    box-shadow: 0 8px 32px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.06);
    /* Solid fallback for Linux without compositor / Windows */
    @supports not (backdrop-filter: blur(1px)) {
      background: #13131f;
    }
  }
  #widget:hover {
    transform: scale(1.02);
    box-shadow: 0 12px 40px rgba(0,0,0,0.70), inset 0 1px 0 rgba(255,255,255,0.09);
  }

  /* ── Minimized pill ── */
  #widget.mini {
    width: 120px;
    height: 44px;
    border-radius: 22px;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 0 14px;
  }
  #widget.mini #header,
  #widget.mini #tank-wrap,
  #widget.mini #stats,
  #widget.mini #statusbar { display: none; }
  #mini-pill { display: none; }
  #widget.mini #mini-pill {
    display: flex;
    align-items: center;
    gap: 8px;
    -webkit-app-region: drag;
    width: 100%;
    justify-content: center;
  }
  #mini-icon { font-size: 18px; line-height: 1; }
  #mini-pct  { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
  #mini-expand {
    -webkit-app-region: no-drag;
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06);
    color: var(--muted);
    font-size: 11px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, color 0.15s;
    flex-shrink: 0;
  }
  #mini-expand:hover { background: rgba(255,255,255,0.14); color: var(--text); }

  /* ── Header ── */
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px 6px;
    -webkit-app-region: drag;
    flex-shrink: 0;
  }
  #app-name {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 1.4px;
    text-transform: uppercase;
    color: var(--muted);
  }
  #header-btns {
    -webkit-app-region: no-drag;
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .hdr-btn {
    width: 20px;
    height: 20px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06);
    color: var(--muted);
    font-size: 12px;
    line-height: 1;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, color 0.15s;
  }
  .hdr-btn:hover { background: rgba(255,255,255,0.14); color: var(--text); }
  #btn-close:hover { background: rgba(244,67,54,0.30); color: #f44336; border-color: #f4433666; }

  /* ── Tank area ── */
  #tank-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4px 0 0;
  }
  #tank-svg { overflow: visible; }

  /* clip path for liquid fill */
  #liquid-rect {
    transition: y 0.7s cubic-bezier(0.4,0,0.2,1),
                height 0.7s cubic-bezier(0.4,0,0.2,1),
                fill 0.6s ease;
  }

  /* pulsing red glow */
  @keyframes pulse-red {
    0%, 100% { filter: drop-shadow(0 0 4px #f44336aa); }
    50%       { filter: drop-shadow(0 0 12px #f44336ff); }
  }
  .pulsing { animation: pulse-red 1.2s ease-in-out infinite; }

  /* wave */
  @keyframes wave {
    0%   { d: path("M0,6 C14,2 28,10 42,6 C56,2 70,10 84,6 L84,12 L0,12 Z"); }
    50%  { d: path("M0,4 C14,8 28,0 42,4 C56,8 70,0 84,4 L84,12 L0,12 Z"); }
    100% { d: path("M0,6 C14,2 28,10 42,6 C56,2 70,10 84,6 L84,12 L0,12 Z"); }
  }
  #wave-path { animation: wave 3s ease-in-out infinite; }

  #pct-text {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -1px;
    dominant-baseline: middle;
    text-anchor: middle;
    fill: #fff;
    filter: drop-shadow(0 1px 3px rgba(0,0,0,0.6));
    transition: fill 0.5s;
  }

  /* ── Stats panel ── */
  #stats {
    padding: 6px 14px 8px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex-shrink: 0;
  }
  .stat-row {
    font-size: 11px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 5px;
    line-height: 1.5;
  }
  .stat-row span.val { color: var(--text); font-weight: 500; }
  #last-updated {
    font-size: 9.5px;
    color: rgba(123,123,154,0.6);
    margin-top: 2px;
    text-align: right;
  }

  /* spinning loader */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    display: inline-block;
    width: 10px;
    height: 10px;
    border: 1.5px solid rgba(255,255,255,0.15);
    border-top-color: #7c7cff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }

  /* ── Status bar ── */
  #statusbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 14px 11px;
    flex-shrink: 0;
  }
  #status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #00e676;
    cursor: pointer;
    transition: background 0.3s, box-shadow 0.3s;
    flex-shrink: 0;
  }
  #status-dot.cached { background: var(--yellow); box-shadow: 0 0 6px #ffeb3b88; }
  #status-dot.error  { background: var(--red);    box-shadow: 0 0 6px #f4433688; }
  #status-dot.live   { background: var(--green);  box-shadow: 0 0 6px #00e67688; }
  #status-label {
    font-size: 9.5px;
    color: var(--muted);
    margin-left: 5px;
    flex: 1;
  }

  /* ── Setup / token-missing screen ── */
  #setup-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 22px 16px 20px;
    height: 100%;
    -webkit-app-region: drag;
  }
  #setup-screen.visible { display: flex; }
  #setup-screen.visible ~ #header,
  #setup-screen.visible ~ #tank-wrap,
  #setup-screen.visible ~ #stats,
  #setup-screen.visible ~ #statusbar { display: none; }

  #setup-emoji { font-size: 28px; }
  #setup-title {
    font-size: 14px;
    font-weight: 700;
    text-align: center;
    line-height: 1.35;
  }
  #setup-hint {
    font-size: 10px;
    color: var(--muted);
    text-align: center;
    line-height: 1.5;
  }
  #token-input {
    -webkit-app-region: no-drag;
    width: 100%;
    padding: 8px 10px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.14);
    background: rgba(255,255,255,0.07);
    color: var(--text);
    font-size: 11px;
    outline: none;
    transition: border-color 0.2s;
  }
  #token-input:focus { border-color: #7c7cff; }
  #save-btn {
    -webkit-app-region: no-drag;
    width: 100%;
    padding: 8px;
    border-radius: 8px;
    border: none;
    background: linear-gradient(135deg, #6c63ff, #9c5aff);
    color: #fff;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  #save-btn:hover { opacity: 0.88; }
  #save-btn:disabled { opacity: 0.4; cursor: default; }
</style>
</head>
<body>

<!-- ── Setup screen (shown when token missing) ── -->
<div id="widget">

  <div id="setup-screen">
    <div id="setup-emoji">👋</div>
    <div id="setup-title">Connect FluxMeter</div>
    <div id="setup-hint">
      Paste your OAuth token below.<br>
      Find it in <code style="font-size:9px;color:#9c9ccc">~/.claude/.credentials.json</code><br>
      under <code style="font-size:9px;color:#9c9ccc">access_token</code>
    </div>
    <input id="token-input" type="password" placeholder="Bearer token..." autocomplete="off" />
    <button id="save-btn">Save &amp; Connect</button>
  </div>

  <!-- ── Normal view ── -->
  <div id="header">
    <span id="app-name">FluxMeter</span>
    <div id="header-btns">
      <button id="btn-minimize" class="hdr-btn" title="Minimize">—</button>
      <button id="btn-close"    class="hdr-btn" title="Quit">✕</button>
    </div>
  </div>

  <div id="tank-wrap">
    <!--
      Tank SVG:
      Outer frame  84 × 160
      Inner fill   74 × 140  (5px inset each side, 10px inset top)
    -->
    <svg id="tank-svg" width="84" height="170" viewBox="0 0 84 170">
      <defs>
        <!-- liquid clip -->
        <clipPath id="tank-clip">
          <rect x="5" y="10" width="74" height="140" rx="6" ry="6"/>
        </clipPath>

        <!-- metallic glass border gradient -->
        <linearGradient id="border-grad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.22"/>
          <stop offset="50%"  stop-color="#ffffff" stop-opacity="0.06"/>
          <stop offset="100%" stop-color="#ffffff" stop-opacity="0.18"/>
        </linearGradient>

        <!-- tank body fill -->
        <linearGradient id="body-grad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#1a1a2e" stop-opacity="0.9"/>
          <stop offset="100%" stop-color="#0d0d1a" stop-opacity="0.95"/>
        </linearGradient>

        <!-- liquid gradient overlay -->
        <linearGradient id="liquid-grad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"   stop-color="#fff" stop-opacity="0.18"/>
          <stop offset="100%" stop-color="#000" stop-opacity="0.12"/>
        </linearGradient>

        <!-- glass shine -->
        <linearGradient id="shine-grad" x1="0" y1="0" x2="1" y2="0">
          <stop offset="0%"   stop-color="#fff" stop-opacity="0.10"/>
          <stop offset="30%"  stop-color="#fff" stop-opacity="0.20"/>
          <stop offset="100%" stop-color="#fff" stop-opacity="0.02"/>
        </linearGradient>
      </defs>

      <!-- Cap top -->
      <rect x="22" y="4" width="40" height="12" rx="4" ry="4"
            fill="rgba(100,100,140,0.25)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

      <!-- Tank body background -->
      <rect x="5" y="10" width="74" height="140" rx="8" ry="8"
            fill="url(#body-grad)"/>

      <!-- Liquid fill (clipped) -->
      <g clip-path="url(#tank-clip)">
        <!-- Base color rect — animated -->
        <rect id="liquid-rect" x="5" y="150" width="74" height="0" fill="#00e676"/>

        <!-- Liquid gradient overlay -->
        <rect id="liquid-overlay" x="5" y="10" width="74" height="140"
              fill="url(#liquid-grad)" clip-path="url(#tank-clip)"/>

        <!-- Wave at liquid surface -->
        <g id="wave-group" transform="translate(5, 0)">
          <path id="wave-path"
            d="M0,6 C14,2 28,10 42,6 C56,2 70,10 84,6 L84,12 L0,12 Z"
            fill="rgba(255,255,255,0.18)"/>
        </g>
      </g>

      <!-- Tank border (metallic look) -->
      <rect x="5" y="10" width="74" height="140" rx="8" ry="8"
            fill="none" stroke="url(#border-grad)" stroke-width="1.5"/>

      <!-- Glass shine strip -->
      <rect x="10" y="16" width="18" height="128" rx="4" ry="4"
            fill="url(#shine-grad)" opacity="0.6"/>

      <!-- Percentage text -->
      <text id="pct-text" x="42" y="80">—</text>

      <!-- Bottom cap -->
      <rect x="14" y="148" width="56" height="10" rx="4" ry="4"
            fill="rgba(100,100,140,0.30)" stroke="rgba(255,255,255,0.10)" stroke-width="1"/>

      <!-- Tick marks on the right side -->
      <line x1="79" y1="45"  x2="74" y2="45"  stroke="rgba(255,255,255,0.20)" stroke-width="1"/>
      <line x1="79" y1="80"  x2="74" y2="80"  stroke="rgba(255,255,255,0.20)" stroke-width="1"/>
      <line x1="79" y1="115" x2="74" y2="115" stroke="rgba(255,255,255,0.20)" stroke-width="1"/>

      <!-- Spinner overlay (shown while loading) -->
      <g id="spinner-svg" opacity="0">
        <circle cx="42" cy="80" r="14" fill="rgba(0,0,0,0.45)"/>
        <circle cx="42" cy="80" r="10" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="2.5"/>
        <path d="M42,70 A10,10 0 0 1 52,80" fill="none" stroke="#7c7cff" stroke-width="2.5"
              stroke-linecap="round">
          <animateTransform attributeName="transform" type="rotate"
                            from="0 42 80" to="360 42 80" dur="0.8s" repeatCount="indefinite"/>
        </path>
      </g>
    </svg>
  </div>

  <div id="stats">
    <div class="stat-row">⏱ <span id="reset-val" class="val">—</span></div>
    <div class="stat-row">📅 Weekly: <span id="weekly-val" class="val">—</span></div>
    <div class="stat-row">🤖 Model: <span id="model-val" class="val">—</span></div>
    <div id="last-updated">Last updated: —</div>
  </div>

  <div id="statusbar">
    <div id="status-dot" class="live" title="Click to refresh"></div>
    <span id="status-label">Live</span>
  </div>

  <!-- Mini pill (visible only in collapsed mode) -->
  <div id="mini-pill">
    <span id="mini-icon">⛽</span>
    <span id="mini-pct">—</span>
    <button id="mini-expand" title="Expand">↑</button>
  </div>
</div>

<script>
(function () {
  'use strict';

  // ── State ─────────────────────────────────────────────────────────────────
  let currentPct = null;   // remaining %
  let isMini = false;
  let lastUpdate = null;
  let timerHandle = null;

  // ── DOM refs ──────────────────────────────────────────────────────────────
  const widget      = document.getElementById('widget');
  const setupScreen = document.getElementById('setup-screen');
  const tokenInput  = document.getElementById('token-input');
  const saveBtn     = document.getElementById('save-btn');
  const btnMin      = document.getElementById('btn-minimize');

  const liquidRect  = document.getElementById('liquid-rect');
  const waveGroup   = document.getElementById('wave-group');
  const pctText     = document.getElementById('pct-text');
  const spinnerSvg  = document.getElementById('spinner-svg');

  const resetVal    = document.getElementById('reset-val');
  const weeklyVal   = document.getElementById('weekly-val');
  const modelVal    = document.getElementById('model-val');
  const lastUpdEl   = document.getElementById('last-updated');

  const statusDot   = document.getElementById('status-dot');
  const statusLabel = document.getElementById('status-label');
  const miniPct     = document.getElementById('mini-pct');

  // ── Tank constants ────────────────────────────────────────────────────────
  const TANK_TOP    = 10;   // y of top of inner fill area
  const TANK_HEIGHT = 140;  // height of inner fill area

  // ── Helpers ───────────────────────────────────────────────────────────────

  function colorForPct(pct) {
    if (pct > 50)  return '#00e676';
    if (pct > 25)  return '#ffeb3b';
    if (pct > 10)  return '#ff9800';
    return '#f44336';
  }

  function setTankLevel(remainingPct) {
    const clamped  = Math.max(0, Math.min(100, remainingPct));
    const fillH    = (clamped / 100) * TANK_HEIGHT;
    const fillY    = TANK_TOP + TANK_HEIGHT - fillH;
    const color    = colorForPct(clamped);

    liquidRect.setAttribute('y', fillY);
    liquidRect.setAttribute('height', fillH);
    liquidRect.setAttribute('fill', color);

    // Wave sits at liquid surface
    waveGroup.setAttribute('transform', `translate(5, ${fillY - 6})`);

    pctText.textContent = clamped === 0 ? '0%' : `${Math.round(clamped)}%`;
    pctText.setAttribute('fill', clamped <= 10 ? '#fff' : '#fff');

    // Pulse only when critically low
    if (clamped <= 10) {
      liquidRect.classList.add('pulsing');
    } else {
      liquidRect.classList.remove('pulsing');
    }

    miniPct.textContent = `${Math.round(clamped)}%`;
    miniPct.style.color = color;
  }

  function setStatus(state, label) {
    statusDot.className = state;  // 'live' | 'cached' | 'error'
    statusLabel.textContent = label;
  }

  function setLoading(on) {
    spinnerSvg.setAttribute('opacity', on ? '1' : '0');
  }

  function formatCountdown(isoStr) {
    if (!isoStr) return '—';
    const diff = new Date(isoStr) - Date.now();
    if (diff <= 0) return 'now';
    const h = Math.floor(diff / 3_600_000);
    const m = Math.floor((diff % 3_600_000) / 60_000);
    if (h > 0) return `${h}h ${m}m`;
    return `${m}m`;
  }

  function formatAgo(ts) {
    if (!ts) return '—';
    const diff = Math.floor((Date.now() - ts) / 1000);
    if (diff < 60)  return 'just now';
    if (diff < 120) return '1 min ago';
    return `${Math.floor(diff / 60)} mins ago`;
  }

  function startAgoTimer() {
    clearInterval(timerHandle);
    timerHandle = setInterval(() => {
      if (lastUpdate) lastUpdEl.textContent = `Last updated: ${formatAgo(lastUpdate)}`;
    }, 15_000);
  }

  // ── IPC callbacks ─────────────────────────────────────────────────────────

  window.fluxAPI.onTokenMissing(() => {
    setLoading(false);
    setupScreen.classList.add('visible');
  });

  window.fluxAPI.onUsageUpdate((data) => {
    setLoading(false);
    setupScreen.classList.remove('visible');

    const usedPct     = data.sessionPercent ?? 0;
    const remainingPct = 100 - usedPct;

    currentPct = remainingPct;
    setTankLevel(remainingPct);

    resetVal.textContent  = `Resets in ${formatCountdown(data.resetsAt)}`;
    weeklyVal.textContent = data.weeklyPercent != null ? `${Math.round(data.weeklyPercent)}% used` : '—';
    modelVal.textContent  = data.model
      ? data.model.charAt(0).toUpperCase() + data.model.slice(1)
      : '—';

    lastUpdate = data.fetchedAt || Date.now();
    lastUpdEl.textContent = `Last updated: just now`;
    startAgoTimer();

    if (data.stale) {
      setStatus('cached', 'Cached');
    } else {
      setStatus('live', 'Live');
    }
  });

  window.fluxAPI.onFetchError((msg) => {
    setLoading(false);
    setStatus('error', 'Error');
    console.error('Fetch error:', msg);
  });

  window.fluxAPI.onToggleMinimized((mini) => {
    isMini = mini;
    widget.classList.toggle('mini', isMini);
    btnMin.title = isMini ? 'Restore' : 'Minimize';
  });

  // ── Setup form ────────────────────────────────────────────────────────────

  saveBtn.addEventListener('click', async () => {
    const val = tokenInput.value.trim();
    if (!val) return;
    saveBtn.disabled = true;
    saveBtn.textContent = 'Saving…';
    setLoading(true);
    try {
      await window.fluxAPI.saveToken(val);
    } catch (_) {}
    saveBtn.disabled = false;
    saveBtn.textContent = 'Save & Connect';
  });

  tokenInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') saveBtn.click();
  });

  // ── Minimize / Expand / Close ─────────────────────────────────────────────
  btnMin.addEventListener('click', () => window.fluxAPI.minimize());
  document.getElementById('mini-expand').addEventListener('click', () => window.fluxAPI.minimize());
  document.getElementById('btn-close').addEventListener('click', () => window.fluxAPI.quit());

  // ── Status dot = manual refresh ───────────────────────────────────────────

  statusDot.addEventListener('click', async () => {
    setLoading(true);
    setStatus('live', 'Refreshing…');
    try {
      await window.fluxAPI.refreshNow();
    } catch (_) {
      setStatus('error', 'Error');
      setLoading(false);
    }
  });

  // ── Initial spinner ───────────────────────────────────────────────────────
  setLoading(true);

})();
</script>
</body>
</html>
